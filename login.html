<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Khobragade Computer Service Centre</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<section class="login-page">

<div class="login-box">

<div class="login-logo">

<img src="logo.png" alt="Khobragade Computer Service Centre Logo" width="80">

<h2>Khobragade Computer Service Centre</h2>

<p>Digital Seva Portal Login</p>

</div>

<form>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
placeholder="Username"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Password"
required>

</div>

<button
type="submit"
class="btn btn-primary">

Login

</button>

</form>

<p class="login-footer">

© 2026 Khobragade Computer Service Centre

</p>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
<!-- ==========================================
LOGIN OPTIONS
========================================== -->

<div class="login-options">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">

Forgot Password?

</a>

</div>

<!-- ==========================================
LOGIN TYPE
========================================== -->

<div class="login-type">

<h3>Select Login Type</h3>

<div class="hero-buttons">

<button type="button" class="btn btn-primary">

<i class="fa-solid fa-user"></i>

User Login

</button>

<button type="button" class="btn btn-outline">

<i class="fa-solid fa-user-shield"></i>

Admin Login

</button>

</div>

</div>

<!-- ==========================================
QUICK ACCESS
========================================== -->

<div class="login-links">

<a href="index.html">

<i class="fa-solid fa-house"></i>

Home

</a>

<a href="services.html">

<i class="fa-solid fa-list"></i>

Services

</a>

<a href="contact.html">

<i class="fa-solid fa-phone"></i>

Contact

</a>

</div>

<!-- ==========================================
LOGIN NOTICE
========================================== -->

<div class="login-notice">

<i class="fa-solid fa-circle-info"></i>

<p>

This login page is for authorized users only.

</p>

</div>
